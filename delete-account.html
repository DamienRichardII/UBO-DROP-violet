<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>UBODROP - Suppression de compte</title></head><body><main><h1>Suppression de compte UBODROP</h1><p>Pour supprimer votre compte, envoyez votre demande depuis l'application (section Compte) ou par email à support@ubodrop.com en précisant l'adresse email du compte.</p><p>La demande est traitée sous 30 jours maximum, sauf obligation légale de conservation.</p></main></body></html>
