<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Retour Stripe — UBODROP</title>
  <style>
    :root {
      --cream: #EAE4D8;
      --bordeaux: #5C1A18;
      --bordeaux-dark: #3A0F0C;
      --text: #2A1A10;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', Arial, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .logo { height: 36px; margin-bottom: 28px; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #eee;
      border-top-color: var(--bordeaux);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.25rem; color: var(--bordeaux-dark); margin-bottom: 10px; }
    p  { font-size: .9rem; color: #666; line-height: 1.6; margin-bottom: 20px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 50px;
      font-size: .85rem; font-weight: 700; margin-bottom: 20px;
    }
    .badge-ok      { background: rgba(0,180,90,.1);  color: #0a6e3a; }
    .badge-warn    { background: rgba(255,160,0,.12); color: #8a5c00; }
    .badge-error   { background: rgba(200,30,30,.1);  color: #8a0000; }
    .badge-pending { background: rgba(80,80,200,.1);  color: #2a2a8a; }
    a.btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--bordeaux);
      color: var(--cream);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: .95rem;
      margin-top: 8px;
    }
    .detail { font-size: .78rem; color: #aaa; margin-top: 12px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card" id="card">
    <img class="logo" src="/assets/img/logo-ubodrop-brown.png" alt="UBODROP" />
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Vérification de votre compte Stripe…</h2>
    <p id="message">Nous vérifions l'état de votre compte Stripe Connect. Cela prend quelques secondes.</p>
    <div id="badge-wrap"></div>
    <a class="btn" href="/app.html" id="cta" style="display:none;">Retour à mon espace</a>
    <p class="detail" id="detail"></p>
  </div>

  <script>
    const API_BASE = '';  // Vercel proxy → Railway

    function getToken() {
      try {
        const raw = localStorage.getItem('ubodrop_app_session');
        if (!raw) return null;
        const data = JSON.parse(raw);
        return data?.accessToken ?? null;
      } catch { return null; }
    }

    function showResult(status, message, badgeClass, badgeText, detail) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = {
        connected:      '✅ Stripe connecté avec succès !',
        pending:        '⏳ Vérification en cours',
        action_required:'⚠️ Des informations sont encore nécessaires',
        disabled:       '🚫 Compte Stripe désactivé',
        not_connected:  '❓ Compte non trouvé',
        error:          '⚠️ Impossible de vérifier',
      }[status] ?? message;

      document.getElementById('message').textContent = message;

      const bw = document.getElementById('badge-wrap');
      bw.innerHTML = `<span class="badge ${badgeClass}">${badgeText}</span>`;

      if (detail) {
        document.getElementById('detail').textContent = detail;
      }

      const cta = document.getElementById('cta');
      cta.style.display = 'inline-block';

      if (status === 'action_required') {
        // Rediriger vers un nouveau lien Stripe pour compléter l'onboarding
        const ctaStripe = document.createElement('a');
        ctaStripe.className = 'btn';
        ctaStripe.textContent = 'Compléter mon inscription Stripe →';
        ctaStripe.href = '#';
        ctaStripe.style.display = 'block';
        ctaStripe.style.marginBottom = '8px';
        ctaStripe.onclick = async (e) => {
          e.preventDefault();
          ctaStripe.textContent = 'Redirection…';
          try {
            const token = getToken();
            const res = await fetch(`${API_BASE}/api/v1/payments/connect/onboarding-link`, {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
            });
            const data = await res.json();
            if (data?.url) window.location.href = data.url;
            else alert('Impossible de générer un lien Stripe. Réessaie depuis ton espace pro.');
          } catch {
            alert('Erreur réseau. Reviens à ton espace pro et réessaie.');
          }
        };
        bw.after(ctaStripe);
      }
    }

    async function checkStripeStatus() {
      const token = getToken();
      if (!token) {
        showResult('error',
          'Tu n\'es pas connecté. Connecte-toi à ton espace pro pour vérifier ton statut Stripe.',
          'badge-warn', '⚠ Non connecté', '');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/v1/payments/connect/status`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.message ?? `HTTP ${res.status}`);
        }

        const data = await res.json();
        // L'API répond avec { data: { status, ... } } via l'interceptor de réponse
        const s = data?.data ?? data;
        const status = s?.status ?? 'error';

        if (status === 'connected') {
          showResult('connected',
            'Ton compte Stripe est activé. Tu peux recevoir des paiements UBODROP directement sur ton compte bancaire.',
            'badge-ok', '✅ Stripe connecté', '');
        } else if (status === 'pending') {
          showResult('pending',
            'Ton compte Stripe est en cours de vérification par Stripe. C\'est généralement rapide (quelques heures). Aucune action de ta part n\'est nécessaire.',
            'badge-pending', '⏳ Vérification en cours', '');
        } else if (status === 'action_required') {
          showResult('action_required',
            'Stripe a besoin d\'informations complémentaires pour activer ton compte. Clique sur le bouton ci-dessous pour compléter ton inscription.',
            'badge-warn', '⚠️ Action requise', '');
        } else if (status === 'disabled') {
          const reason = s?.stripeDisabledReason ?? '';
          showResult('disabled',
            'Ton compte Stripe est temporairement désactivé. Contacte le support UBODROP ou accède à ton dashboard Stripe pour plus d\'informations.',
            'badge-error', '🚫 Compte désactivé', reason ? `Raison : ${reason}` : '');
        } else if (status === 'not_connected') {
          showResult('not_connected',
            'Aucun compte Stripe n\'a été trouvé. Reviens à ton espace pro et clique sur "Connecter mon compte Stripe".',
            'badge-warn', '❓ Non connecté', '');
        } else {
          showResult('error',
            'Statut Stripe inconnu. Reviens à ton espace pro.',
            'badge-warn', '? Statut inconnu', '');
        }
      } catch (err) {
        showResult('error',
          'Impossible de vérifier ton statut Stripe pour le moment. Reviens à ton espace pro et clique sur "Vérifier le statut Stripe".',
          'badge-warn', '⚠ Erreur réseau',
          String(err));
      }

      // Auto-redirection vers l'app après 5s si statut 'connected'
      const titleEl = document.getElementById('title');
      if (titleEl?.textContent?.includes('✅')) {
        setTimeout(() => { window.location.href = '/app.html'; }, 5000);
        document.getElementById('detail').textContent = 'Redirection automatique dans 5 secondes…';
      }
    }

    checkStripeStatus();
  </script>
</body>
</html>
